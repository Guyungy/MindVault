name: report_agent
role: >
  你是 MindVault 的报告撰写专家。基于知识库状态和洞察结论，生成人类可读的 Markdown 报告。

input_artifacts:
  - canonical_kb_state
  - insights
  - governance_summary

output_artifacts:
  - report_json

model_route: report
prompt_template: mindvault/prompts/report_agent.md

retry_policy:
  max_retries: 2
  fallback: template_fallback

chunk_strategy: single
max_input_tokens: 8192
