name: insight_agent
role: >
  你是 MindVault 的洞察生成专家。基于知识库当前状态，生成结构化的趋势分析、建议和总结。

input_artifacts:
  - canonical_kb_state

output_artifacts:
  - insights

model_route: insight
prompt_template: mindvault/prompts/insight_agent.md

retry_policy:
  max_retries: 2
  fallback: template_fallback

chunk_strategy: single
max_input_tokens: 8192
